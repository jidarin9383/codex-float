name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: Build & smoke tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Unit tests
        run: swift test

      - name: Smoke tests
        run: swift run CodexFloatCoreSmokeTests

      - name: Package .app (ad-hoc)
        env:
          CODEX_FLOAT_GITHUB_REPO: ${{ github.repository }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/make-app-icon.sh scripts/package-app.sh
          ./scripts/package-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodexFloat-macos
          path: |
            dist/*.zip
          if-no-files-found: error
