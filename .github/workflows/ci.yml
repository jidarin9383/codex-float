name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: Build & smoke tests
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Smoke tests
        run: swift run CodexFloatCoreSmokeTests

      - name: Package .app (ad-hoc)
        env:
          CODEX_FLOAT_GITHUB_REPO: ${{ github.repository }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/make-app-icon.sh scripts/package-app.sh
          ./scripts/package-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexFloat-macos
          path: |
            dist/*.zip
          if-no-files-found: error
