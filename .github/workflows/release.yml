name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package & publish
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package universal .app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          CODEX_FLOAT_GITHUB_REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/make-app-icon.sh scripts/package-app.sh
          ./scripts/package-app.sh

      - name: Update GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Codex Float ${{ steps.ver.outputs.version }}
          files: |
            dist/CodexFloat-${{ steps.ver.outputs.version }}-macos-universal.zip
          fail_on_unmatched_files: true
