name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package & publish
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package .app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          CODEX_FLOAT_GITHUB_REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/make-app-icon.sh scripts/package-app.sh
          ./scripts/package-app.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Codex Float ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.zip
          body: |
            ## Codex Float ${{ steps.ver.outputs.version }}

            Native macOS menu-bar + floating widget for Codex weekly quota.

            ### Install
            1. Download the `CodexFloat-*-macos-*.zip` asset for your Mac.
            2. Unzip and drag **Codex Float.app** into `/Applications`.
            3. If macOS blocks open: right-click the app → **Open** → **Open**.
            4. Requires a local [Codex CLI](https://github.com/openai/codex) login.

            ### Notes
            - Ad-hoc signed open-source build (not Developer ID / notarized).
            - Apple Silicon (`arm64`) CI artifact; Intel Macs can build from source.
