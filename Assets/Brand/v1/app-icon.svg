<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="tile" x1="180" y1="80" x2="860" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1C1E"/>
      <stop offset="0.55" stop-color="#0B0B0C"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="sheen" x1="200" y1="120" x2="700" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="320" y1="280" x2="720" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8EEF7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS squircle tile -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#tile)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#sheen)"/>

  <!-- Soft float glow -->
  <ellipse cx="512" cy="700" rx="210" ry="56" fill="#10A37F" opacity="0.18"/>

  <!-- Code chip -->
  <g filter="url(#soft)">
    <rect x="292" y="286" width="440" height="340" rx="92" fill="url(#mark)"/>
    <!-- Code lines -->
    <path d="M380 400 H520" stroke="#0B0B0C" stroke-width="36" stroke-linecap="round"/>
    <path d="M380 470 H644" stroke="#0B0B0C" stroke-width="36" stroke-linecap="round"/>
    <path d="M380 540 H580" stroke="#0B0B0C" stroke-width="36" stroke-linecap="round"/>
    <!-- Caret / play tip (agent) -->
    <path d="M620 388 L700 470 L620 552 Z" fill="#0B0B0C"/>
  </g>

  <!-- Float arc under chip -->
  <path d="M340 710 C420 770 604 770 684 710" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" opacity="0.92"/>
  <circle cx="512" cy="742" r="18" fill="#10A37F"/>
</svg>
