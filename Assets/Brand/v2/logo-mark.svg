  <!-- `>` -->
  <path d="M13.5 10.2 L18.2 13 L13.5 15.8"
        stroke="#173238" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <ellipse cx="13.4" cy="10.6" rx="1.5" ry="0.9" fill="#FFFFFF" opacity="0.22" transform="rotate(-28 13.4 10.6)"/>
  <path d="M9.2 23.9 C12 25.6 20 25.6 22.8 23.9" stroke="#5F8A92" stroke-opacity="0.55" stroke-width="1.2" stroke-linecap="round"/>
