<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="none">
  <!-- Ocean Mist mark -->
  <defs>
    <radialGradient id="orb" cx="0.35" cy="0.3" r="0.8">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#E6F2F4"/>
      <stop offset="1" stop-color="#A9C8CF"/>
    </radialGradient>
  </defs>
  <ellipse cx="16" cy="26.2" rx="7" ry="1.55" fill="#5F8A92" opacity="0.2"/>

  <!-- Outer progress (outside orb) -->
