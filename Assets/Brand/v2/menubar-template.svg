<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
  <!--
    18pt menu bar — solid disc (one circle), outer progress ~1/3, `>` cutout, float ground.
    Black template for system tinting.
  -->
  <!-- Outer track -->
  <circle cx="9" cy="7.75" r="5.55"
          stroke="#000000" stroke-width="1.15" fill="none"/>
  <!-- Progress ≈ 1/3 from 12 o'clock -->
  <path d="M9 2.2 A5.55 5.55 0 0 1 13.8 10.525"
        stroke="#000000" stroke-width="1.55" stroke-linecap="round" fill="none"/>

  <!-- Solid disc with `>` hole (evenodd) -->
  <path fill="#000000" fill-rule="evenodd" d="
    M 9 4.05
    a 3.7 3.7 0 1 1 0 7.4
    a 3.7 3.7 0 1 1 0 -7.4
    z
    M 7.25 6.05
    L 10.55 7.75
    L 7.25 9.45
    L 7.25 8.55
    L 9.15 7.75
    L 7.25 6.95
    Z
  "/>

  <!-- Float ground -->
  <path d="M4.4 15.15 C6.7 16.55 11.3 16.55 13.6 15.15"
        stroke="#000000" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
